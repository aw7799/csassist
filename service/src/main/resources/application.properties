spring.application.name=service

spring.datasource.url=jdbc:h2:mem:csassist;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Enrichment provider selection: ollama (default, local) or groq (OpenAI-compatible)
csassist.enrichment.llm-provider=ollama

spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.base-url=http://localhost:11434

# OpenAI-compatible client repointed at Groq (used only when llm-provider=groq)
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.api-key=${GROQ_API_KEY:unset}

# We build a single explicit ChatClient bean in EnrichmentChatClientConfig instead of
# relying on Spring AI's auto-configured ChatClient.Builder, which is ambiguous when
# both the Ollama and OpenAI chat model starters are on the classpath.
spring.ai.chat.client.enabled=false

spring.ai.mcp.client.streamable-http.connections.kb.url=http://localhost:3900/mcp

# Ticket creation calls the LLM synchronously and must stay bounded even when the
# LLM is unreachable. Spring AI's defaults (10 attempts, up to 180s backoff each)
# can block a single request for minutes; keep total retry overhead under ~1s.
spring.ai.retry.max-attempts=2
spring.ai.retry.backoff.initial-interval=300ms
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=1s
