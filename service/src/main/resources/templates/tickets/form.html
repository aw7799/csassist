<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${isEdit} ? 'Edit Ticket' : 'New Ticket'"></title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        label { display: block; margin-top: 1rem; }
        .error { color: #b00020; font-size: 0.9rem; }
    </style>
</head>
<body>
<h1 th:text="${isEdit} ? 'Edit Ticket' : 'New Ticket'"></h1>
<form method="post"
      th:action="${isEdit} ? @{/tickets/{id}(id=${ticketId})} : @{/tickets}"
      th:object="${ticketRequest}">

    <label for="title">Title</label>
    <input type="text" id="title" th:field="*{title}"/>
    <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

    <label for="description">Description</label>
    <textarea id="description" th:field="*{description}"></textarea>

    <div th:if="${!isEdit}">
        <label for="status">Status</label>
        <select id="status" th:field="*{status}">
            <option th:each="s : ${T(com.csassist.service.ticket.TicketStatus).values()}"
                    th:value="${s}" th:text="${s}"></option>
        </select>
    </div>
    <div th:if="${isEdit}">
        <label>Status</label>
        <p th:text="${currentStatus}"></p>
    </div>

    <label for="assignee">Assignee</label>
    <input type="text" id="assignee" th:field="*{assignee}"/>

    <p><button type="submit" th:text="${isEdit} ? 'Save' : 'Create'"></button></p>
</form>
<p><a href="/tickets">Back to list</a></p>
</body>
</html>
